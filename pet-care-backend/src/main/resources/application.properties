spring.application.name=backend

# ─── MySQL Database ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/petcare_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ────────────────────────────────────────────────────
jwt.secret=PetCareConnectSuperSecretKeyFor256BitHMACAlgorithm!!
jwt.expiration=86400000

# ─── Gemini API ─────────────────────────────────────────────
gemini.api.key=${GEMINI_API_KEY:}

# ─── Groq API (free alternative) ────────────────────────────
groq.api.key=${GROQ_API_KEY:}

# ─── Google Gemini API (free vision model) ───────────────────
google.gemini.api.key=${GOOGLE_GEMINI_API_KEY:}

# ─── Server ─────────────────────────────────────────────────
server.port=8080
